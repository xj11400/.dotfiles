# general
# =======

# fix 0;10;1c
# https://github.com/microsoft/WSL/issues/5931
set -sg escape-time 50

# remap prefix to 'M-\'
unbind C-b
set -g prefix 'M-\'
bind-key 'M-\' send-prefix
#bind \ last-window

# make delay shorter
#set -sg escape-time 0

# force tmux to use utf-8
setw -gq utf8 on

# Force utf-8
set -gq status-utf8 on

# Automatic renaming will be disabled for the window if you rename it manually.
set-window-option -g automatic-rename

# terminal coloring
set -g default-terminal "screen-256color"

# key bindings
# ============

# reload config file
bind R source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded!"

# kill-session
bind C-d kill-session

# synchronize all panes in a window
# :setw synchronize-panes
#bind _ setw synchronize-panes

# pane movement shortcuts (same as vim)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# enable mouse support for switching panes/windows
#set -g mouse-utf8 on
#set -g mouse on

# copy mode : vi
# ==============

#set-option -g mouse on
setw -g mode-keys vi
set-option -s set-clipboard off

# v to start copying
bind-key -T copy-mode-vi v send-keys -X begin-selection

# 
bind-key -T copy-mode-vi 'C-v' send-keys -X rectangle-toggle

# y as Enter
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Paste into the buffer with <prefix>+P (make sure that it’s uppercase P).
bind P paste-buffer

# tmux plugin manager
# ===================

# list of plugins
# ---------------
# Note: set `tmux-window-name` before `tmux-resurrect`
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-pain-control'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'ofirgall/tmux-window-name'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-sidebar'
set -g @plugin 'charlietag/tmux-split-statusbar'

set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'schasse/tmux-jump'
# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'

# plugin config
# -------------

# prefix highlight
set -g @prefix_highlight_fg 'white'
set -g @prefix_highlight_bg 'blue'
set -g @prefix_highlight_prefix_prompt ' ' #'Wait'

set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_copy_prompt ' ' #'Copy'
set -g @prefix_highlight_copy_mode_attr "fg=white,bg=yellow,bold"

set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_sync_prompt ' ' #'Sync'
set -g @prefix_highlight_sync_mode_attr 'fg=white,bg=yellow'

set -g @prefix_highlight_empty_has_affixes 'on' # default is 'off'
set -g @prefix_highlight_empty_prompt ' ' #'    '
set -g @prefix_highlight_empty_attr 'fg=default,bg=default' # default is 'fg=default,bg=default'

set -g status-right '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

# window name
set -g @tmux_window_name_shells "['zsh', 'bash', 'sh']"

# split status bar
set -g @split-statusbar-mode 'on'
set -g @split-statusbar-bindkey 'M-s'
set -g @split-status-hide-bindkey 'M-d'

# config tpm
# ----------

# chang plugins install dir
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.local/share/tmux/plugins/'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.local/share/tmux/plugins/tpm/tpm'

# style
# =====
#source-file ${HOME}/.local/share/tmux/theme/themepack/basic.tmuxtheme

run-shell ${HOME}/.local/share/tmux/theme/themepack/themepack.tmux
set -g @themepack 'powerline/block/blue'
#set -g @themepack-status-right-area-right-format '#{prefix_highlight} | %a %Y-%m-%d %H:%M'

